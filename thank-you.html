<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Referral received by IAN demo." />
    <title>Referral Received | IAN</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header simple-header">
      <a class="brand" href="index.html" aria-label="IAN home">
        <span class="brand-mark">IAN</span>
      </a>
      <a class="text-link" href="index.html">Back to home</a>
    </header>

    <main class="confirmation-page">
      <section class="section-band">
        <div class="container narrow-container">
          <div class="confirmation-panel">
            <p class="eyebrow">Referral signal</p>
            <h1>Referral received</h1>
            <p class="section-copy">
              Thank you. Your referral has been recorded for this demo.
            </p>
            <p>
              In a real version, IAN would review the context, reputation signal and fit before
              any next step.
            </p>

            <section class="referral-summary" id="referral-summary" hidden>
              <h2>Referral summary</h2>
              <dl>
                <div>
                  <dt>Name</dt>
                  <dd id="summary-name"></dd>
                </div>
                <div>
                  <dt>LinkedIn</dt>
                  <dd id="summary-linkedin"></dd>
                </div>
                <div>
                  <dt>Company</dt>
                  <dd id="summary-company"></dd>
                </div>
                <div>
                  <dt>Role</dt>
                  <dd id="summary-role"></dd>
                </div>
              </dl>
            </section>

            <div class="hero-actions">
              <a class="button button-secondary" href="index.html">Back to home</a>
              <a class="button button-primary" href="join-professional.html">Submit another referral</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
